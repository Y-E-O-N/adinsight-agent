version: 2

models:
  - name: int_ig_post_source_quality
    description: "source hashtag별 raw/staging 품질 요약 모델. seed별 수집량, 좋아요 숨김 비율, 광고/협찬 후보 비율을 비교해 후속 수집 또는 분석 적합성을 판단한다."
    columns:
      - name: source_hashtag
        description: "게시물이 발견된 seed hashtag."
        data_tests:
          - not_null
          - unique

      - name: posts
        description: "해당 source hashtag에서 발견된 post-source row 수."
        data_tests:
          - not_null

      - name: distinct_posts
        description: "해당 source hashtag에서 발견된 서로 다른 게시물 수."
        data_tests:
          - not_null

      - name: distinct_owners
        description: "해당 source hashtag에서 발견된 서로 다른 작성자 수."
        data_tests:
          - not_null

      - name: hidden_likes_rate
        description: "좋아요 수가 숨겨진 게시물 비율."
        data_tests:
          - not_null

      - name: sponsored_candidate_rate
        description: "caption 키워드 기준 광고/협찬 후보 게시물 비율."
        data_tests:
          - not_null

      - name: has_minimum_sample
        description: "분석 seed로 보기 위한 최소 샘플 기준. 현재 기준은 posts >= 20."
        data_tests:
          - not_null

      - name: useful_for_sponsored_analysis
        description: "최소 샘플 수와 광고/협찬 후보 비율 기준을 동시에 만족하면 true."
        data_tests:
          - not_null

  - name: int_ig_sponsored_candidates
    description: "caption 기준 광고/협찬 후보 게시물만 분리한 intermediate 모델. 후속 marts에서 협찬 유형, 작성자, engagement signal 분석에 재사용"
    columns:
      - name: post_id
        description: "Instagram post raw id"
        data_tests:
          - not_null
          - unique

      - name: short_code
        description: "Instagram post short code"
        data_tests:
          - not_null

      - name: owner_username
        description: "게시물 작성자 username"
        data_tests:
          - not_null

      - name: sponsored_keyword_group
        description: "caption에서 감지된 광고/협찬 키워드 그룹. product_provided, ad_disclosure, other_keyword 중 하나"
        data_tests:
          - not_null
          - accepted_values:
              values: ['product_provided', 'ad_disclosure', 'other_keyword']

      - name: engagement_count
        description: "좋아요 수와 댓글 수를 합산한 단순 engagement count. 좋아요 숨긴 건은 0으로 계산"
        data_tests:
          - not_null

      - name: has_engagement_signal
        description: "좋아요 또는 댓글 중 하나라도 분석 가능한 신호가 있는지 나타내는 boolean flag"
        data_tests:
          - not_null

  - name: int_ig_owner_activity
    description: "Instagram 작성자별 게시물 수, 광고/협찬 후보 비율, 좋아요 숨김 비율, engagement signal을 요약한 intermediate 모델."
    columns:
      - name: owner_username
        description: "게시물 작성자 username. 이 모델의 grain이다."
        data_tests:
          - not_null
          - unique

      - name: posts
        description: "작성자별 게시물 수."
        data_tests:
          - not_null

      - name: sponsored_candidate_posts
        description: "작성자별 광고/협찬 후보 게시물 수."
        data_tests:
          - not_null

      - name: sponsored_candidate_rate
        description: "작성자별 게시물 중 광고/협찬 후보 게시물 비율."
        data_tests:
          - not_null

      - name: hidden_likes_rate
        description: "작성자별 게시물 중 좋아요 수가 숨겨진 게시물 비율."
        data_tests:
          - not_null

      - name: has_engagement_signal
        description: "작성자의 게시물에 좋아요 또는 댓글 기반 engagement signal이 있는지 나타내는 boolean flag."
        data_tests:
          - not_null

  - name: int_campaign_payment_performance
    description: "Campaign grain의 synthetic payment performance intermediate 모델. campaign budget, observed post attribution, payment event를 결합해 ROAS mart의 기반 지표를 계산한다."
    columns:
      - name: campaign_id
        description: "Synthetic campaign primary key. 이 모델의 grain이다."
        data_tests:
          - not_null
          - unique

      - name: campaign_budget_krw
        description: "KRW 기준 synthetic campaign budget."
        data_tests:
          - not_null

      - name: attributed_posts
        description: "Campaign에 연결된 observed Apify posts 수."
        data_tests:
          - not_null

      - name: distinct_creators
        description: "Campaign에 연결된 distinct creator 수."
        data_tests:
          - not_null

      - name: payment_events
        description: "Campaign에 귀속된 synthetic payment events 수."
        data_tests:
          - not_null

      - name: refunded_events
        description: "Campaign에 귀속된 synthetic refund event 수."
        data_tests:
          - not_null

      - name: gross_payment_amount_krw
        description: "Campaign별 gross payment amount."
        data_tests:
          - not_null

      - name: net_payment_amount_krw
        description: "환불 이벤트를 음수로 반영한 campaign별 net payment amount."
        data_tests:
          - not_null
