# =============================================================================
# docker-compose.yml — AdInsight Agent 로컬 데이터 스택 (Phase 1)
# -----------------------------------------------------------------------------
# 서비스: postgres(pgvector) / redis / airflow(5종) / flower / superset
# 포트:   5432 / 6379 / 8081 / 8088 / 5555
# 실무 관례:
#   - 이미지 태그 pin (latest 금지)
#   - 모든 서비스 healthcheck + depends_on condition 으로 기동 순서 보장
#   - 시크릿은 .env 주입 (${VAR} 형식)
#   - named volume 으로 데이터 영속화
# =============================================================================

# Airflow 5개 서비스 (webserver/scheduler/worker/triggerer/flower)의 공통 설정
# YAML 앵커 (&airflow-common)로 정의 -> 각 서비스에서 <<: *airflow-common으로 병합
x-airflow-common: &airflow-common
  build:
    context: ./infra/airflow
    dockerfile: Dockerfile
  image: adinsight/airflow:2.9.3
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-CeleryExecutor}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
      postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
    AIRFLOW__CELERY__RESULT_BACKEND: >-
      db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
    AIRFLOW__CELERY__BROKER_URL: redis://${REDIS_HOST}:${REDIS_PORT}/0
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW_CONN_WAREHOUSE: >-
      postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./metrics:/opt/airflow/metrics
    - ./dbt:/opt/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # Postgres (pgvector) — warehouse + airflow_meta + superset_meta 공유
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: adinsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      AIRFLOW_DB: ${AIRFLOW_DB}
      SUPERSET_DB: ${SUPERSET_DB}
      AGENT_DB_USER: ${AGENT_DB_USER}
      AGENT_DB_PASSWORD: ${AGENT_DB_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — Celery broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: adinsight-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # airflow-init — DB 마이그레이션 + admin 유저 생성 후 종료 (1회성)
  # restart: "no" — 성공 종료 후 재시작하지 않음
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: adinsight-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}
    restart: "no"

  # ---------------------------------------------------------------------------
  # airflow-webserver — Airflow UI (localhost:8080)
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: adinsight-airflow-webserver
    command: webserver
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # airflow-scheduler — DAG 파싱 + 스케줄링
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: adinsight-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # airflow-worker — 태스크 실행 (Celery)
  # ---------------------------------------------------------------------------
  airflow-worker:
    <<: *airflow-common
    container_name: adinsight-airflow-worker
    command: celery worker
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d \"celery@$${HOSTNAME}\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # airflow-triggerer — deferrable operator 용 (async I/O)
  # ---------------------------------------------------------------------------
  airflow-triggerer:
    <<: *airflow-common
    container_name: adinsight-airflow-triggerer
    command: triggerer
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type TriggererJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # flower — Celery 모니터링 UI (localhost:5555)
  # ---------------------------------------------------------------------------
  flower:
    <<: *airflow-common
    container_name: adinsight-flower
    command: celery flower
    ports:
      - "5555:5555"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # superset — BI 대시보드 (localhost:8088)
  # ---------------------------------------------------------------------------
  superset:
    build:
      context: ./infra/superset
      dockerfile: Dockerfile
    image: adinsight/superset:4.0.2
    container_name: adinsight-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: ${SUPERSET_LOAD_EXAMPLES:-false}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SUPERSET_DB: ${SUPERSET_DB}
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./dashboards:/app/dashboards
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# =============================================================================
# Volumes — 컨테이너 재시작 후에도 데이터 유지
# =============================================================================
volumes:
  postgres_data:
    name: adinsight_postgres_data
  redis_data:
    name: adinsight_redis_data
  superset_data:
    name: adinsight_superset_data